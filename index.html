<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bovichain - Offline</title>
    <meta name="theme-color" content="#edff77" />
    <link rel="manifest" href="./manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Rethink+Sans:wght@300..800&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="https://e45a1d9b2fd81a177eaa3a70ba83bda4.cdn.bubble.io/f1750077006501x159873402843107020/bovichain-icon.svg" />
    <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
    <div id="app-root"></div>
    <script>
        (function () {
            var isDesktop = window.matchMedia('(min-width: 800px)').matches;
            var path = isDesktop ? './assets/desktop/content.html' : './assets/mobile/content.html';
            fetch(path)
                .then(function (r) { return r.text(); })
                .then(function (html) {
                    document.getElementById('app-root').innerHTML = html;
                    var s = document.createElement('script');
                    s.type = 'module';
                    s.src = './assets/js/app.js';
                    document.body.appendChild(s);
                })
                .catch(function (err) {
                    document.getElementById('app-root').innerHTML = '<p style="padding:20px;">Erro ao carregar. Tente recarregar a página.</p>';
                });
        })();
    </script>
</body>

</html>
